name: Daily AI Trending Report

on:
  schedule:
    # UTC 08:00 daily (Beijing 16:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Custom provider secrets are optional. Without them, use GitHub
          # Models with the job-scoped token so bilingual copy works by default.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || github.token }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE || 'https://models.github.ai/inference' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'openai/gpt-4.1' }}
        run: python github_trending.py || (echo "First attempt failed, retrying..." && sleep 30 && python github_trending.py)

      - name: Cleanup old reports
        run: |
          find reports/ -maxdepth 1 -type d -name "20*" -mtime +30 -exec rm -rf {} + 2>/dev/null || true

      - name: Commit and push report
        env:
          TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -f reports/ docs/
          DATE=$(date -u +%Y-%m-%d)
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "report: add daily AI trending report ${DATE}"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
