name: Daily AI Trending Report

on:
  schedule:
    # UTC 08:00 daily (Beijing 16:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python github_trending.py || (echo "First attempt failed, retrying..." && sleep 30 && python github_trending.py)

      - name: Cleanup old reports
        run: |
          find reports/ -maxdepth 1 -type d -name "20*" -mtime +30 -exec rm -rf {} + 2>/dev/null || true

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f reports/ docs/
          DATE=$(date -u +%Y-%m-%d)
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "report: add daily AI trending report ${DATE}"
            git push
          fi
