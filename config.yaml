# ============================================================================
# GitHub AI Radar — 配置文件
# ============================================================================
# 修改此文件可自定义追踪范围、评分公式、输出格式等。
# 所有字段都有默认值，删掉的字段会自动回退到内置默认值。

# ---------------------------------------------------------------------------
# 时间窗口 & API 设置
# ---------------------------------------------------------------------------
time_window_hours: 48          # 数据采集时间窗口（小时）

api:
  pages_per_query: 2           # 每个查询抓取的页数
  per_page: 100                # 每页返回的仓库数
  request_interval: 2          # 请求间隔（秒）
  rate_limit_sleep: 12         # 触发速率限制后等待（秒）
  max_retries: 3               # 速率限制重试次数

# ---------------------------------------------------------------------------
# 评分公式权重（必须加起来 = 1.0）
# ---------------------------------------------------------------------------
scoring:
  today_stars_weight: 0.40     # 当日 star 增量（来自 Trending 页面）
  growth_rate_weight: 0.30     # 近期增长速率
  recency_weight: 0.15         # push 时间新鲜度
  base_stars_weight: 0.15      # 基础影响力（log 压缩）

# ---------------------------------------------------------------------------
# 排行榜设置
# ---------------------------------------------------------------------------
rankings:
  core_top_n: 10               # AI/LLM 核心榜 Top N
  app_top_n: 20                # AI 应用榜 Top N
  deduplicate: true            # 核心榜出现过的仓库不再出现在应用榜

# ---------------------------------------------------------------------------
# 新项目查询阈值（created:>time_window 内的新项目最少需要多少 star）
# ---------------------------------------------------------------------------
new_project_min_stars:
  ai: 50
  llm: 50
  agent: 20
  general: 50

# ---------------------------------------------------------------------------
# 搜索查询 — topic 列表
# 主力查询: pushed:>time_window + topic:X
# ---------------------------------------------------------------------------
search_topics:
  - llm
  - machine-learning
  - deep-learning
  - ai-agent
  - generative-ai
  - chatbot
  - rag
  - langchain
  - transformer
  - diffusion
  - nlp
  - computer-vision
  - openai
  - agent
  - mcp                        # Model Context Protocol
  - pytorch
  - copilot
  - multimodal

